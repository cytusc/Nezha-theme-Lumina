services:
  lumina:
    image: lumina-theme:latest
    build: .
    container_name: lumina-theme
    restart: unless-stopped
    ports:
      - "0.0.0.0:${LUMINA_PORT:-3000}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NEZHA_HOST=${NEZHA_HOST:-host.docker.internal}
      - NEZHA_PORT=${NEZHA_PORT:-8008}
      - LUMINA_DASHBOARD_USERNAME=${LUMINA_DASHBOARD_USERNAME:-}
      - LUMINA_DASHBOARD_PASSWORD=${LUMINA_DASHBOARD_PASSWORD:-}
